version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: lumen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
      POSTGRES_DB: lumen
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: golang:1.23-alpine
    container_name: lumen-backend
    working_dir: /app
    command: sh -c "go mod tidy && go run ./cmd/api"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
